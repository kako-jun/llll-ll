base_url = "https://llll-ll.com"
title = "llll-ll"
description = "kako-jun's games and apps portfolio"
# Zola 標準ルール: 既定言語をルート直下に出す（en が / = canonical）。
# ja/zh/es は接頭辞付き（/ja/ /zh/ /es/）。ja を既定にしない方針（#5）。
default_language = "en"
theme = "avel"
compile_sass = false
build_search_index = false
generate_feeds = false

# ── 既定言語(en)の UI 文言。全 UI 文字列をキー化し、テンプレは trans() で引く。 ──
# btop 風の小さな角ラベル（header/apps/footer/visits/mypace/blog/bbs/app/art of today）と
# 日替わり絵の作品名『…』は技術ラベル/固有名としてそのまま（btop 美学・#5 合意）。
